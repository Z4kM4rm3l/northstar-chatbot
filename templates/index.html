<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Star Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a2a1a 0%, #2d4a2d 50%, #1a3a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-wrapper {
            width: 420px;
            height: 680px;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: linear-gradient(135deg, #2d5a27, #1a4a3a);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4a9e3f, #2d7a5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info h2 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }

        .header-info span {
            color: #7dd87d;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #7dd87d;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .reset-btn {
            margin-left: auto;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .reset-btn:hover { background: rgba(255,255,255,0.2); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: #fff;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .message.user {
            background: linear-gradient(135deg, #2d5a27, #1a4a3a);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message strong { font-weight: 600; }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #fff;
            padding: 10px 16px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .typing-indicator span {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #aaa;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 20px;
            background: #f5f5f0;
        }

        .quick-reply {
            background: #fff;
            border: 1px solid #d0e8d0;
            color: #2d5a27;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-reply:hover {
            background: #2d5a27;
            color: #fff;
            border-color: #2d5a27;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            background: #fff;
            border-top: 1px solid #e8e8e8;
        }

        .chat-input input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: #2d5a27; }

        .send-btn {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #2d5a27, #1a4a3a);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="avatar">🏔️</div>
            <div class="header-info">
                <h2>North Star Support</h2>
                <span><span class="status-dot"></span>Online — here to help</span>
            </div>
            <button class="reset-btn" onclick="resetChat()">↺ Reset</button>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="quick-replies">
            <button class="quick-reply" onclick="sendQuick('Track my order')">📦 Track Order</button>
            <button class="quick-reply" onclick="sendQuick('I want to make a return')">🔄 Returns</button>
            <button class="quick-reply" onclick="sendQuick('Help me find gear')">🧭 Recommendations</button>
            <button class="quick-reply" onclick="sendQuick('Talk to a person')">💬 Live Agent</button>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your message..." onkeydown="handleKey(event)" />
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <script>
        const messagesEl = document.getElementById('chatMessages');
        const inputEl = document.getElementById('userInput');
        const typingEl = document.getElementById('typingIndicator');

        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function addMessage(content, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = formatMessage(content);
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            typingEl.style.display = 'block';
            messagesEl.appendChild(typingEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideTyping() {
            typingEl.style.display = 'none';
            if (typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            inputEl.value = '';
            showTyping();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                hideTyping();
                addMessage(data.response, 'bot');
            } catch (err) {
                hideTyping();
                addMessage("Sorry, something went wrong. Please try again.", 'bot');
            }
        }

        function sendQuick(text) {
            inputEl.value = text;
            sendMessage();
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function resetChat() {
            await fetch('/reset', { method: 'POST' });
            messagesEl.innerHTML = '';
            initChat();
        }

        async function initChat() {
            showTyping();
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: '__init__' })
                });
                const data = await res.json();
                hideTyping();
                addMessage(data.response, 'bot');
            } catch (err) {
                hideTyping();
            }
        }

        initChat();
    </script>
</body>
</html>
